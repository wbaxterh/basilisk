version: "3.9"

# Basilisk local dev stack.
# Usage: docker compose up -d db          (just the database)
#        docker compose up -d             (full infra stack)
#        docker compose --profile cardano up -d  (with Ogmios + Kupo chain sync)

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: basilisk-db
    environment:
      POSTGRES_USER: basilisk
      POSTGRES_PASSWORD: basilisk_dev
      POSTGRES_DB: basilisk
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U basilisk"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: basilisk-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Cardano chain data (opt-in via --profile cardano)
  # Connects to a public preprod relay — no local node needed.
  ogmios:
    image: cardanosolutions/ogmios:latest
    container_name: basilisk-ogmios
    profiles: ["cardano"]
    command: >
      --host 0.0.0.0
      --node-socket /dev/null
      --node-config /dev/null
    environment:
      CARDANO_NODE_SOCKET_PATH: ""
      OGMIOS_HOST: "0.0.0.0"
      OGMIOS_PORT: "1337"
    ports:
      - "1337:1337"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:1337/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  kupo:
    image: cardanosolutions/kupo:latest
    container_name: basilisk-kupo
    profiles: ["cardano"]
    depends_on:
      ogmios:
        condition: service_healthy
    command: >
      --ogmios-host ogmios
      --ogmios-port 1337
      --host 0.0.0.0
      --port 1442
      --workdir /db
      --match "*"
      --since origin
      --prune-utxo
    ports:
      - "1442:1442"
    volumes:
      - kupodata:/db
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:1442/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  pgdata:
  kupodata:
