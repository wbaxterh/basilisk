name: UI Screenshots

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/src/types/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Build web app
        run: |
          npm run build --workspace packages/shared
          npm run build --workspace apps/web

      - name: Start server & take screenshots
        run: |
          npx next start apps/web -p 3000 &
          sleep 5
          node scripts/screenshot-routes.mjs http://localhost:3000 screenshots

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: screenshots/
          retention-days: 14

      - name: Post screenshots to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const screenshotDir = 'screenshots';
            const files = fs.readdirSync(screenshotDir).filter(f => f.endsWith('.png')).sort();

            if (files.length === 0) {
              console.log('No screenshots found');
              return;
            }

            // Build a text-only summary (images are in the artifact)
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let body = '## UI Screenshots\n\n';
            body += `Auto-generated preview of all routes in this PR.\n\n`;
            body += `**Download screenshots:** [View artifacts](${runUrl})\n\n`;
            body += '| Route | Status |\n|-------|--------|\n';

            for (const file of files) {
              const route = file.replace('.png', '');
              const routePath = route === 'dashboard' ? '/' : `/${route}`;
              body += `| \`${routePath}\` | captured |\n`;
            }

            body += `\n*${files.length} screenshots captured. Download the \`ui-screenshots\` artifact to review.*\n`;
            body += '\n---\n*Generated by UI Screenshots workflow*';

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('## UI Screenshots')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
